<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Camaroneras - BGR Group</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header-logos{background:#1a1a2e;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:90px}
.logo-left img{height:78px;object-fit:contain}
.logo-right{display:flex;align-items:center;gap:16px}
.logo-right img{height:52px;object-fit:contain;background:#fff;border-radius:6px;padding:4px 10px}
.header-title{background:#0f172a;border-top:1px solid rgba(255,255,255,.08);padding:10px 24px;text-align:center}
.header-title h1{font-size:20px;font-weight:700;letter-spacing:1px;color:#fff;text-transform:uppercase}
.header-title span{font-size:11px;color:#64748b}
.filters-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px;min-width:140px}
.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b}
.fg select{border:1px solid #cbd5e1;border-radius:6px;padding:6px 10px;font-size:13px;background:#fff;color:#1a1a2e;outline:none;cursor:pointer}
.fg select:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.estado-inline{display:none;flex-direction:column;gap:3px;min-width:140px}
.estado-inline label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b}
.estado-box{border-radius:6px;padding:6px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;border:2px solid}
.estado-box.pescada{background:#dcfce7;color:#166534;border-color:#16a34a}
.estado-box.pendiente{background:#fef9c3;color:#854d0e;border-color:#ca8a04}
.metric-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px 8px}
.metric-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.metric-group:last-child{margin-bottom:0}
.grp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;white-space:nowrap;min-width:90px}
.metric-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;border:1.5px solid transparent;cursor:pointer;transition:all .15s;background:#f1f5f9;color:#64748b;white-space:nowrap}
.metric-chip:hover{background:#e2e8f0;color:#1a1a2e}
.metric-chip.active{color:#fff}
.metric-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.cards-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid #ccc;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:6px}
.card-value{font-size:26px;font-weight:700;line-height:1}
.card-sub{font-size:11px;color:#94a3b8;margin-top:4px}
.agg-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;margin-left:6px;vertical-align:middle}
.agg-sum{background:#fef3c7;color:#92400e}.agg-avg{background:#ede9fe;color:#5b21b6}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chart-title{font-size:13px;font-weight:600;color:#475569;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.chart-title span{font-size:11px;font-weight:400;color:#94a3b8}
.table-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.t-title{font-size:13px;font-weight:600;color:#475569;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.anomaly-badge{font-size:11px;color:#dc2626;background:#fef2f2;padding:3px 10px;border-radius:8px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;background:#f8fafc;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;color:#334155}
tr:hover td{background:#f8fafc}
.hi{color:#dc2626;font-weight:700}.lo{color:#16a34a;font-weight:700}
.badge-p{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534}
.badge-n{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;background:#fef9c3;color:#854d0e}
.tscroll{max-height:360px;overflow-y:auto;border-radius:8px;border:1px solid #e2e8f0}
.no-data{text-align:center;padding:40px;color:#94a3b8;font-size:13px}</style>
</head>

function renderBarChart(data){
  const sorted=data.slice().sort((a,b)=>(b[aM.idx]||0)-(a[aM.idx]||0)).slice(0,30);
  const labels=sorted.map(r=>`${r[I.S].replace(/_/g,' ')} | P${r[I.P]}`);
  const vals=sorted.map(r=>+r[aM.idx].toFixed(4));
  const mn2=Math.min(...vals),mx2=Math.max(...vals);
  const bgArr=vals.map(v=>{const rt=(v-mn2)/(mx2-mn2||1);return rt>.8?'#dc2626cc':rt<.2?'#16a34acc':aM.color+'cc'});
  const h=Math.max(280,sorted.length*26+60);
  $('barWrap').style.height=h+'px';
  if(barChart)barChart.destroy();
  barChart=new Chart($('barChart').getContext('2d'),{type:'bar',data:{labels,datasets:[{label:aM.label,data:vals,backgroundColor:bgArr,borderColor:aM.color,borderWidth:.5,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmtNum(ctx.raw,aM.fmt)+' '+aM.unit}}},scales:{x:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:11},callback:v=>fmtNum(v,aM.fmt)}},y:{ticks:{font:{size:11}},grid:{display:false}}}}});
}
function renderSectorChart(data){
  const bySec={};
  data.forEach(r=>{const s=r[I.S];if(!bySec[s])bySec[s]=[];if(r[aM.idx]!==null)bySec[s].push(r[aM.idx])});
  const sectors=Object.keys(bySec).sort();
  const secVals=sectors.map(s=>+aggregate(bySec[s],aM.agg).toFixed(4));
  const secOverall=+avg(secVals).toFixed(4);
  $('secWrap').style.height='240px';
  if(secChart)secChart.destroy();
  secChart=new Chart($('secChart').getContext('2d'),{type:'bar',data:{labels:sectors.map(s=>s.replace(/_/g,' ')),datasets:[{label:aM.agg==='sum'?'Total sector':'Promedio sector',data:secVals,backgroundColor:secVals.map(v=>v>secOverall*1.15?'#dc2626bb':v<secOverall*0.85?'#16a34abb':aM.color+'bb'),borderColor:aM.color,borderWidth:.5,borderRadius:4},{label:'Referencia global',data:sectors.map(()=>secOverall),type:'line',borderColor:'#f59e0b',borderWidth:2,pointRadius:0,borderDash:[6,3],fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:ctx=>' '+fmtNum(ctx.raw,aM.fmt)+' '+aM.unit}}},scales:{x:{ticks:{font:{size:10},maxRotation:40,autoSkip:false},grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:11},callback:v=>fmtNum(v,aM.fmt)}}}}});
}
function renderTable(data,av,mn,mx){
  const thi=av+1.5*(mx-av),tlo=av-1.5*(av-mn);
  const sorted=data.slice().sort((a,b)=>(b[aM.idx]||0)-(a[aM.idx]||0));
  $('anomalyMsg').textContent=sorted.filter(r=>r[aM.idx]>thi||r[aM.idx]<tlo).length?`⚠ ${sorted.filter(r=>r[aM.idx]>thi||r[aM.idx]<tlo).length} fuera de rango`:'';
  $('thM').textContent=aM.label;
  if(!sorted.length){$('tbody').innerHTML='<tr><td colspan="7" class="no-data">Sin datos para los filtros seleccionados</td></tr>';return}
  $('tbody').innerHTML=sorted.map(r=>{const v=r[aM.idx],cls=v>thi?'hi':v<tlo?'lo':'';const badge=r[I.EST]==='PESCADA'?'<span class="badge-p">PESCADA</span>':'<span class="badge-n">PENDIENTE</span>';return`<tr><td><strong>${r[I.E]}</strong></td><td>${r[I.S].replace(/_/g,' ')}</td><td>${r[I.CO]}</td><td style="text-align:center">${r[I.P]}</td><td style="text-align:center">${badge}</td><td style="text-align:right">${r[I.H].toFixed(1)}</td><td style="text-align:right" class="${cls}">${fmtNum(v,aM.fmt)}</td></tr>`}).join('');
}
document.addEventListener('DOMContentLoaded',()=>{
  const empresas=[...new Set(RAW.map(r=>r[I.E]))].sort();
  $('fE').innerHTML='<option value="">Todas las empresas</option>'+empresas.map(e=>`<option>${e}</option>`).join('');
  buildMetricSelector();
  $('fE').onchange=()=>{$('fS').value='';$('fC').value='';$('fP').value='';render()};
  $('fS').onchange=()=>{$('fC').value='';$('fP').value='';render()};
  $('fC').onchange=()=>{$('fP').value='';render()};
  $('fP').onchange=render;
  render();
});</script>
</body>
