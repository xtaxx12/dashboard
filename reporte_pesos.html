<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon.png">
<title>Reporte de Pesos — BGR Group</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#1a1a2e;display:flex;flex-direction:column;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #c8a14a;flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff}
.brand-mark{width:44px;height:44px;border-radius:50%;background:#fff;object-fit:contain;display:block}
.brand-text .b1{font-size:15px;font-weight:800;letter-spacing:1.5px;display:block;line-height:1}
.brand-text .b2{font-size:10px;color:#94a3b8;letter-spacing:1px;text-transform:uppercase}
.nav{display:flex;gap:6px;flex-wrap:wrap}
.nav a{color:#94a3b8;text-decoration:none;font-size:12px;font-weight:600;padding:7px 14px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;transition:background .15s,color .15s}
.nav a:hover{background:rgba(255,255,255,.08);color:#fff}
.nav a.active{background:#c8a14a;color:#1a1a2e}
.title-bar{background:#0f172a;padding:8px 24px;text-align:center;color:#fff;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.title-bar h1{font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.title-bar span{font-size:10px;color:#64748b}
.title-bar .open-ext{position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:11px;color:#94a3b8;text-decoration:none;font-weight:600;padding:5px 12px;border:1px solid rgba(255,255,255,.15);border-radius:6px;text-transform:uppercase;letter-spacing:.5px;transition:background .15s,color .15s}
.title-bar .open-ext:hover{background:rgba(255,255,255,.08);color:#fff}
.title-wrap{position:relative}
.embed{flex:1;display:flex;background:#f0f2f5;min-height:0}
.embed iframe{width:100%;height:100%;border:0;display:block;background:#fff}
@media(max-width:700px){
  .header{padding:10px 14px}
  .nav a{padding:5px 10px;font-size:11px}
  .brand-text .b1{font-size:13px}
  .title-bar .open-ext{position:static;transform:none;display:inline-block;margin-top:6px}
  .title-bar{padding:10px 14px}
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="brand">
    <img class="brand-mark" src="icon.png" alt="BGR Group">
    <div class="brand-text"><span class="b1">BGR GROUP</span><span class="b2">Acuícola</span></div>
  </a>
  <div class="nav">
    <a href="index.html">Inicio</a>
    <a href="costos.html">Costos</a>
    <a href="reporte_pesos.html" class="active">Reporte Pesos</a>
    <a href="exportaciones.html">Exportaciones</a>
  </div>
</div>

<div class="title-bar title-wrap">
  <h1>Reporte de Pesos</h1>
  <span>Power BI · BGR Group</span>
  <a href="https://app.powerbi.com/view?r=eyJrIjoiYmU3MmVjOTgtZTgyOS00YmQzLTg5NjItNWM3M2YwYjE1MTQ5IiwidCI6ImI3OTM5YmU4LWQ4OTUtNGRlNy05ODEzLTg1OWE5NGZkNGM1OCIsImMiOjR9" target="_blank" rel="noopener" class="open-ext">Abrir en Power BI ↗</a>
</div>

<div class="embed">
  <iframe
    title="Reporte de Pesos — Power BI"
    src="https://app.powerbi.com/view?r=eyJrIjoiYmU3MmVjOTgtZTgyOS00YmQzLTg5NjItNWM3M2YwYjE1MTQ5IiwidCI6ImI3OTM5YmU4LWQ4OTUtNGRlNy05ODEzLTg1OWE5NGZkNGM1OCIsImMiOjR9"
    allowfullscreen></iframe>
</div>

</body>
</html>
